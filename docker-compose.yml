version: '3.8'
services:
  db:
    image: postgres:15
    platform: linux/amd64
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifedashboard
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d lifedashboard" ]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - '3000:3000'
    env_file:
      - ./apps/backend/.env
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_DATABASE=lifedashboard
      - DB_SSL=false
      - DB_SYNCHRONIZE=true
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    platform: linux/amd64
    ports:
      - '80:80'
    env_file:
      - ./apps/frontend/.env
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend

volumes:
  db_data:
