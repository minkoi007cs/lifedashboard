version: '3.8'
services:
  db:
    image: mysql:8.0
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lifedashboard
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - '3000:3000'
    env_file:
      - ./apps/backend/.env
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - DB_DATABASE=lifedashboard
      - FRONTEND_URL=http://localhost
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:3000
    platform: linux/amd64
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  db_data:
